<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>用户管理系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Microsoft YaHei", sans-serif; background: #f0f2f5; padding: 30px; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { text-align: center; color: #333; margin-bottom: 30px; }
        .card {
            background: #fff; border-radius: 8px; padding: 20px; margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .card h3 { margin-bottom: 15px; color: #1890ff; border-left: 4px solid #1890ff; padding-left: 10px; }
        .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        input, button { padding: 8px 16px; border-radius: 4px; font-size: 14px; }
        input { border: 1px solid #d9d9d9; outline: none; flex: 1; min-width: 120px; }
        input:focus { border-color: #1890ff; box-shadow: 0 0 0 2px rgba(24,144,255,0.2); }
        button {
            border: none; cursor: pointer; color: #fff; white-space: nowrap;
            transition: opacity 0.2s; background: #1890ff;
        }
        button:hover { opacity: 0.85; }
        button.green { background: #52c41a; }
        button.red { background: #ff4d4f; }
        button.orange { background: #fa8c16; }
        table {
            width: 100%; border-collapse: collapse; margin-top: 10px;
        }
        th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid #f0f0f0; }
        th { background: #fafafa; font-weight: 600; color: #666; }
        tr:hover { background: #f5f5f5; }
        .msg {
            padding: 10px 16px; border-radius: 4px; margin-top: 10px; display: none;
        }
        .msg.success { display: block; background: #f6ffed; border: 1px solid #b7eb8f; color: #52c41a; }
        .msg.error { display: block; background: #fff2f0; border: 1px solid #ffccc7; color: #ff4d4f; }
        .empty { text-align: center; color: #999; padding: 30px 0; }
        .badge {
            display: inline-block; background: #1890ff; color: #fff;
            border-radius: 10px; padding: 2px 10px; font-size: 12px; margin-left: 8px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>📋 用户管理系统</h1>

    <!-- 查询全部 -->
    <div class="card">
        <h3>📄 查询全部用户</h3>
        <button onclick="findAll()" class="green">刷新列表</button>
        <div id="tableContainer">
            <div class="empty">点击上方按钮查看用户数据</div>
        </div>
    </div>

    <!-- 按 id 查询 -->
    <div class="card">
        <h3>🔍 按 ID 查询</h3>
        <div class="row">
            <input type="number" id="queryId" placeholder="输入用户 ID" min="1">
            <button onclick="findById()">查询</button>
        </div>
        <div id="queryResult" class="msg"></div>
    </div>

    <!-- 添加用户 -->
    <div class="card">
        <h3>➕ 添加用户</h3>
        <div class="row">
            <input type="text" id="addName" placeholder="输入姓名">
            <input type="text" id="addAddress" placeholder="输入地址">
            <button onclick="addUser()" class="green">添加</button>
        </div>
        <div id="addResult" class="msg"></div>
    </div>

    <!-- 删除用户 -->
    <div class="card">
        <h3>🗑️ 删除用户</h3>
        <div class="row">
            <input type="number" id="deleteId" placeholder="输入要删除的用户 ID" min="1">
            <button onclick="deleteUser()" class="red">删除</button>
        </div>
        <div id="deleteResult" class="msg"></div>
    </div>
</div>

<script>
    const API = '/api';

    // ====== 1. 查询全部 ======
    async function findAll() {
        const res = await fetch(API + '/users');
        const json = await res.json();
        const container = document.getElementById('tableContainer');

        if (!json.success || json.data.length === 0) {
            container.innerHTML = '<div class="empty">暂无用户数据</div>';
            return;
        }

        let html = `<table>
            <thead><tr><th>ID</th><th>姓名</th><th>地址</th></tr></thead><tbody>`;
        for (const user of json.data) {
            html += `<tr><td>${user.id}</td><td>${user.name}</td><td>${user.address}</td></tr>`;
        }
        html += '</tbody></table>';
        container.innerHTML = html;
    }

    // ====== 2. 按 ID 查询 ======
    async function findById() {
        const id = document.getElementById('queryId').value.trim();
        if (!id) return showMsg('queryResult', '请输入 ID', false);

        const res = await fetch(`${API}/user/${id}`);
        const json = await res.json();
        if (json.success) {
            showMsg('queryResult',
                `找到用户: ID=${json.data.id}, 姓名=${json.data.name}, 地址=${json.data.address}`, true);
        } else {
            showMsg('queryResult', json.message || '未找到该用户', false);
        }
    }

    // ====== 3. 添加用户 ======
    async function addUser() {
        const name = document.getElementById('addName').value.trim();
        const address = document.getElementById('addAddress').value.trim();
        if (!name || !address) return showMsg('addResult', '姓名和地址不能为空', false);

        const res = await fetch(API + '/user', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, address })
        });
        const json = await res.json();
        if (json.success) {
            showMsg('addResult', '✅ 添加成功！', true);
            document.getElementById('addName').value = '';
            document.getElementById('addAddress').value = '';
            findAll(); // 自动刷新列表
        } else {
            showMsg('addResult', '❌ ' + (json.message || '添加失败'), false);
        }
    }

    // ====== 4. 删除用户 ======
    async function deleteUser() {
        const id = document.getElementById('deleteId').value.trim();
        if (!id) return showMsg('deleteResult', '请输入要删除的 ID', false);
        if (!confirm(`确定要删除 ID 为 ${id} 的用户吗？`)) return;

        const res = await fetch(`${API}/user/${id}`, { method: 'DELETE' });
        const json = await res.json();
        if (json.success) {
            showMsg('deleteResult', '✅ ' + json.message, true);
            document.getElementById('deleteId').value = '';
            findAll(); // 自动刷新列表
        } else {
            showMsg('deleteResult', '❌ ' + (json.message || '删除失败'), false);
        }
    }

    // ====== 工具：显示提示消息 ======
    function showMsg(id, text, isSuccess) {
        const el = document.getElementById(id);
        el.textContent = text;
        el.className = 'msg ' + (isSuccess ? 'success' : 'error');
        // 3 秒后自动隐藏
        clearTimeout(el._timer);
        el._timer = setTimeout(() => el.style.display = 'none', 3000);
    }

    // 页面加载后自动查询全部
    window.onload = findAll;
</script>
</body>
</html>
