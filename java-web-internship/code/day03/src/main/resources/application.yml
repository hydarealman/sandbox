# 服务器配置
server:
  port: 8080

# 数据源配置
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/mybatis
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

# MyBatis 配置
mybatis:
  # 别名包扫描
  type-aliases-package: com.neu.vo, com.neu.domain
  # mapper 映射文件路径
  mapper-locations: classpath:*.xml
  # 下划线转驼峰
  configuration:
    map-underscore-to-camel-case: true
